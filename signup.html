<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigFlow - Sign Up</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet">
    <style>
        .pwd-strength-container {
            display: flex;
            gap: 4px;
            margin-top: 6px;
            margin-bottom: 4px;
        }
        .pwd-strength-bar {
            flex-grow: 1;
            height: 4px;
            background-color: var(--border-color);
            border-radius: var(--border-radius-full);
            transition: var(--transition-fast);
        }
        .pwd-strength-bar.weak { background-color: var(--error); }
        .pwd-strength-bar.medium { background-color: var(--secondary); }
        .pwd-strength-bar.strong { background-color: var(--success); }
    </style>
</head>
<body class="flex-center" style="min-height: 100vh; background-color: var(--bg-color); padding: 20px;">

    <div class="card fade-in" style="width: 100%; max-width: 440px; padding: 40px; background-color: var(--surface);">
        <div style="text-align: center; margin-bottom: 32px;">
            <a href="index.html">
                <img src="assets/logo/logo.png" alt="GigFlow Logo" style="height: 42px; margin-bottom: 16px;">
            </a>
            <h2>Create Account</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Start your AI-powered career journey</p>
        </div>

        <form id="signup-form">
            <div class="form-group">
                <label class="form-label" for="signup-name">Full Name</label>
                <input class="form-control" type="text" id="signup-name" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="signup-email">Email Address</label>
                <input class="form-control" type="email" id="signup-email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="signup-industry">Primary Industry</label>
                <select class="form-control" id="signup-industry" required>
                    <option value="" disabled selected>Select your industry</option>
                    <option value="Accounting & Auditing">Accounting & Auditing</option>
                    <option value="Advertising & Marketing">Advertising & Marketing</option>
                    <option value="Agriculture & Forestry">Agriculture & Forestry</option>
                    <option value="Architecture & Planning">Architecture & Planning</option>
                    <option value="Art & Design">Art & Design</option>
                    <option value="Automotive & Mobility">Automotive & Mobility</option>
                    <option value="Aviation & Aerospace">Aviation & Aerospace</option>
                    <option value="Biotechnology & Pharmaceuticals">Biotechnology & Pharmaceuticals</option>
                    <option value="Business Consulting">Business Consulting</option>
                    <option value="Construction & Engineering">Construction & Engineering</option>
                    <option value="Consumer Goods & FMCG">Consumer Goods & FMCG</option>
                    <option value="Customer Service & Support">Customer Service & Support</option>
                    <option value="Data Science & Analytics">Data Science & Analytics</option>
                    <option value="Defense & Space">Defense & Space</option>
                    <option value="E-commerce & Retail">E-commerce & Retail</option>
                    <option value="Education & Training">Education & Training</option>
                    <option value="Energy & Utilities">Energy & Utilities</option>
                    <option value="Entertainment & Media">Entertainment & Media</option>
                    <option value="Environmental Services">Environmental Services</option>
                    <option value="Event Management">Event Management</option>
                    <option value="Finance & Investment">Finance & Investment</option>
                    <option value="Food & Beverages">Food & Beverages</option>
                    <option value="Gaming & Esports">Gaming & Esports</option>
                    <option value="Government & Public Policy">Government & Public Policy</option>
                    <option value="Healthcare & Medical">Healthcare & Medical</option>
                    <option value="Hospitality & Tourism">Hospitality & Tourism</option>
                    <option value="Human Resources & Recruitment">Human Resources & Recruitment</option>
                    <option value="Information Technology (IT)">Information Technology (IT)</option>
                    <option value="Insurance">Insurance</option>
                    <option value="Journalism & News">Journalism & News</option>
                    <option value="Legal Services">Legal Services</option>
                    <option value="Logistics & Supply Chain">Logistics & Supply Chain</option>
                    <option value="Manufacturing & Production">Manufacturing & Production</option>
                    <option value="Maritime & Shipping">Maritime & Shipping</option>
                    <option value="Mining & Metals">Mining & Metals</option>
                    <option value="Non-Profit & NGO">Non-Profit & NGO</option>
                    <option value="Real Estate & Property">Real Estate & Property</option>
                    <option value="Research & Development">Research & Development</option>
                    <option value="Software & SaaS">Software & SaaS</option>
                    <option value="Sports & Fitness">Sports & Fitness</option>
                    <option value="Telecommunications">Telecommunications</option>
                    <option value="Veterinary & Animal Care">Veterinary & Animal Care</option>
                    <option value="Writing & Editing">Writing & Editing</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="signup-password">Password</label>
                <div style="position: relative;">
                    <input class="form-control" type="password" id="signup-password" placeholder="••••••••" required style="padding-right: 48px;">
                    <span class="material-symbols-outlined password-toggle" style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); user-select: none;">visibility</span>
                </div>
                <!-- Strength Indicator -->
                <div class="pwd-strength-container">
                    <div class="pwd-strength-bar"></div>
                    <div class="pwd-strength-bar"></div>
                    <div class="pwd-strength-bar"></div>
                    <div class="pwd-strength-bar"></div>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 600; color: var(--text-muted);">
                    <span>Password strength:</span>
                    <span id="password-strength-text" style="font-weight: 700;">Weak</span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="signup-confirm-password">Confirm Password</label>
                <div style="position: relative;">
                    <input class="form-control" type="password" id="signup-confirm-password" placeholder="••••••••" required style="padding-right: 48px;">
                </div>
            </div>

            <div class="form-group">
                <label class="checkbox-label" style="margin-top: 12px; margin-bottom: 16px;">
                    <input type="checkbox" id="signup-agree" required>
                    <span>I agree to the <a href="#" style="color: var(--primary); font-weight: 600;">Terms & Conditions</a></span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary w-full" style="height: 48px; font-size: 0.95rem;">Sign Up</button>
        </form>

        <div style="margin: 24px 0; display: flex; align-items: center; gap: 16px;">
            <div style="flex: 1; height: 1px; background: var(--border-color);"></div>
            <span style="color: var(--text-muted); font-size: 0.85rem; font-weight: 600;">OR</span>
            <div style="flex: 1; height: 1px; background: var(--border-color);"></div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 12px;">
            <button class="btn btn-outline w-full" style="height: 44px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="Google" style="width: 18px;">
                Continue with Google
            </button>
            <button class="btn btn-outline w-full" style="height: 44px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/linkedin/linkedin-original.svg" alt="LinkedIn" style="width: 18px;">
                Continue with LinkedIn
            </button>
        </div>

        <div style="text-align: center; margin-top: 32px; font-size: 0.9rem; color: var(--text-muted);">
            Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 600;">Sign In</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
