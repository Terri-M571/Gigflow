<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigFlow - Job Application Tracker</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Google Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet">
</head>
<body>

    <!-- Header Placeholder -->
    <div id="navbar-placeholder"></div>

    <div class="app-shell container">
        <!-- Sidebar Placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Workspace -->
        <main class="main-content fade-in" style="display: flex; flex-direction: column; gap: 24px;">
            <div class="flex-between">
                <div>
                    <h1 style="font-size: 1.8rem; font-weight: 800; margin-bottom: 4px;">Application Tracker</h1>
                    <p style="color: var(--text-muted);">Organize your pipeline using a drag-and-drop Kanban interface</p>
                </div>
                <button class="btn btn-primary" onclick="addNewApplicationPrompt()">
                    <span class="material-symbols-outlined">add</span>
                    <span>Add Tracker Card</span>
                </button>
            </div>

            <!-- Kanban Board Grid -->
            <div class="kanban-board">
                <!-- Column 1 -->
                <div class="kanban-column" id="col-saved">
                    <div class="kanban-column-header">
                        <h3 class="kanban-column-title">Saved</h3>
                        <span class="kanban-column-count" id="count-saved">0</span>
                    </div>
                    <!-- Cards injected here -->
                </div>

                <!-- Column 2 -->
                <div class="kanban-column" id="col-applied">
                    <div class="kanban-column-header">
                        <h3 class="kanban-column-title">Applied</h3>
                        <span class="kanban-column-count" id="count-applied">0</span>
                    </div>
                    <!-- Cards injected here -->
                </div>

                <!-- Column 3 -->
                <div class="kanban-column" id="col-interview">
                    <div class="kanban-column-header">
                        <h3 class="kanban-column-title">Interviews</h3>
                        <span class="kanban-column-count" id="count-interview">0</span>
                    </div>
                    <!-- Cards injected here -->
                </div>

                <!-- Column 4 -->
                <div class="kanban-column" id="col-offer">
                    <div class="kanban-column-header">
                        <h3 class="kanban-column-title">Offers</h3>
                        <span class="kanban-column-count" id="count-offer">0</span>
                    </div>
                    <!-- Cards injected here -->
                </div>

                <!-- Column 5 -->
                <div class="kanban-column" id="col-rejected">
                    <div class="kanban-column-header">
                        <h3 class="kanban-column-title">Rejected</h3>
                        <span class="kanban-column-count" id="count-rejected">0</span>
                    </div>
                    <!-- Cards injected here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/tracker.js"></script>
</body>
</html>
