<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigFlow - Cover Letter AI</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Google Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet">
    <!-- html2pdf.js for client-side PDF downloads -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <!-- Header Placeholder -->
    <div id="navbar-placeholder"></div>

    <div class="app-shell container">
        <!-- Sidebar Placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Workspace -->
        <main class="main-content fade-in">
            <div style="margin-bottom: 24px;">
                <h1 style="font-size: 1.8rem; font-weight: 800; margin-bottom: 4px;">AI Cover Letter Generator</h1>
                <p style="color: var(--text-muted);">Generate high-conversion cover letters tailored to targeted role scopes</p>
            </div>

            <div class="dashboard-grid" style="grid-template-columns: 2fr 1.5fr; gap: 24px;">
                <!-- Left Input Panel & Live Editor -->
                <div style="display: flex; flex-direction: column; gap: 24px;">
                    <!-- Parameters Form -->
                    <div class="card" style="padding: 28px; display: flex; flex-direction: column; gap: 20px;">
                        <h3 style="font-size: 1rem; margin: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 8px;">Parameters</h3>
                        <div class="form-row" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;">
                            <div class="form-group">
                                <label class="form-label">Company Name</label>
                                <input class="form-control" type="text" id="cl-company" placeholder="e.g. Netflix">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Position Title</label>
                                <input class="form-control" type="text" id="cl-role" placeholder="e.g. Senior Product Designer">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Job Description / Requirements (Optional context)</label>
                            <textarea class="form-control" id="cl-jd" rows="4" placeholder="Paste the job description here. We will automatically combine it with your uploaded resume details!"></textarea>
                        </div>
                        <div class="form-row" style="display: grid; grid-template-columns: 2fr 1fr; gap: 16px; align-items: flex-end;">
                            <div class="form-group">
                                <label class="form-label">Tone Select</label>
                                <select class="form-control" id="cl-tone">
                                    <option value="Professional">Professional & Corporate</option>
                                    <option value="Creative">Creative & Bold</option>
                                    <option value="Enthusiastic">Passionate & Start-up</option>
                                </select>
                            </div>
                            <button class="btn btn-primary" onclick="generateCoverLetter()" style="height: 46px; font-weight: 700; width: 100%;">
                                <span class="material-symbols-outlined" style="font-size: 18px; margin-right: 6px;">auto_awesome</span>
                                Compile with AI
                            </button>
                        </div>
                    </div>

                    <!-- Output Preview & Live Text Editor -->
                    <div class="card" style="padding: 28px; display: flex; flex-direction: column; gap: 16px; background-color: var(--surface);">
                        <h3 style="font-size: 1rem; margin: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 8px;">Document Live Editor</h3>
                        <textarea id="cl-output-text" class="form-control" style="width: 100%; min-height: 380px; font-family: var(--font-sans); line-height: 1.6; font-size: 0.92rem; border-color: var(--border-color); background: var(--surface-lowest); padding: 16px;" placeholder="Your generated cover letter will render here. You can edit it freely before saving or exporting.">Your generated cover letter will render here. Fill in the parameters and click generate.</textarea>
                        <div style="display: flex; gap: 12px; margin-top: 12px; border-top: 1px solid var(--border-color); padding-top: 16px;">
                            <button class="btn btn-outline" style="flex: 1;" onclick="copyCLText()">
                                <span class="material-symbols-outlined" style="font-size: 16px; margin-right: 6px;">content_copy</span>
                                Copy Text
                            </button>
                            <button class="btn btn-outline" style="flex: 1;" onclick="saveLetterDraft()">
                                <span class="material-symbols-outlined" style="font-size: 16px; margin-right: 6px;">save</span>
                                Save Draft
                            </button>
                            <button class="btn btn-outline" style="flex: 1;" onclick="downloadCLDOCX()">
                                <span class="material-symbols-outlined" style="font-size: 16px; margin-right: 6px;">description</span>
                                Download DOCX
                            </button>
                            <button class="btn btn-primary" style="flex: 1;" onclick="downloadCLPDF()">
                                <span class="material-symbols-outlined" style="font-size: 16px; margin-right: 6px;">download</span>
                                Download PDF
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Right Cover Letter History -->
                <div style="display: flex; flex-direction: column; gap: 24px;">
                    <div class="card" style="padding: 24px; min-height: 300px; display: flex; flex-direction: column;">
                        <h3 style="font-size: 1rem; margin-bottom: 16px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; display: flex; align-items: center; gap: 8px;">
                            <span class="material-symbols-outlined" style="color: var(--primary);">history</span>
                            Letter History
                        </h3>
                        <div id="cl-history-list" style="flex: 1; overflow-y: auto; max-height: 600px; display: flex; flex-direction: column; gap: 8px;">
                            <!-- History items injected here by cover-letter.js -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cover-letter.js"></script>
</body>
</html>
