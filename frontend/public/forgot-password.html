<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigFlow - Forgot Password</title>
    <meta name="description" content="Log in to your GigFlow account and continue your career journey.">
    <!-- Favicon -->
    <link rel="icon" href="assets/logo/gigflow-logo.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet">
    <style>
        /* ============================================================
           GIGFLOW MINIMAL LOGIN PAGE
           ============================================================ */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: var(--font-sans); }

        /* Full Page Background Wrapper */
        .auth-wrapper {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #002f8a 0%, #0047bc 40%, #0056d2 70%, #0e6ff0 100%);
            overflow: hidden;
            padding: 24px;
        }

        /* Radial Glows */
        .auth-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 80% 10%, rgba(255,140,0,0.15) 0%, transparent 55%),
                        radial-gradient(ellipse at 10% 90%, rgba(255,255,255,0.05) 0%, transparent 50%);
            z-index: 1;
        }

        /* Subtle Dotted/Grid Pattern */
        .auth-grid-dots {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.08) 1.5px, transparent 1.5px);
            background-size: 36px 36px;
            z-index: 2;
        }

        /* Very subtle floating blobs */
        .auth-blobs {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 3;
        }
        .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; }
        .blob-1 { width: 400px; height: 400px; background: #ff8c00; top: -100px; right: -100px; animation: blobAnim 10s ease-in-out infinite alternate; }
        .blob-2 { width: 300px; height: 300px; background: #60a5fa; bottom: -80px; left: -80px; animation: blobAnim 8s ease-in-out 2s infinite alternate; }
        
        @keyframes blobAnim {
            from { transform: translate(0,0) scale(1); }
            to { transform: translate(60px, 40px) scale(1.15); }
        }

        /* Centered Glassmorphism Card */
        .auth-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.93);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            width: 100%;
            max-width: 440px;
            padding: 48px 40px;
            opacity: 0;
            transform: translateY(20px);
            animation: cardFadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
        }

        @keyframes cardFadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Branding */
        .auth-logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .auth-logo img {
            height: 48px;
            width: auto;
        }

        /* Typography */
        .auth-title {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }
        .auth-subtitle {
            text-align: center;
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        /* Form Elements */
        .auth-form-group {
            margin-bottom: 20px;
            position: relative;
        }
        .auth-form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .auth-input-wrap {
            position: relative;
        }
        
        .auth-input-wrap input {
            width: 100%;
            height: 48px;
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 0 16px;
            font-family: var(--font-sans);
            font-size: 0.95rem;
            color: #333;
            transition: all 0.3s ease;
        }
        
        .auth-input-wrap input:focus {
            outline: none;
            border-color: #004AC6;
            box-shadow: 0 0 0 4px rgba(0, 74, 198, 0.1);
        }

        /* Primary Button */
        .auth-btn-primary {
            width: 100%;
            height: 48px;
            background: #ff8c00;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            font-family: var(--font-sans);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(255, 140, 0, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .auth-btn-primary:hover {
            background: #e57e00;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 140, 0, 0.3);
        }
        .auth-btn-primary:active {
            transform: translateY(0);
            background: #cc7000;
        }

        /* Footer Links */
        .auth-footer {
            text-align: center;
            font-size: 0.9rem;
            color: #666;
        }
        .auth-footer a {
            color: #004AC6;
            font-weight: 700;
            text-decoration: none;
            margin-left: 4px;
            transition: color 0.2s ease;
        }
        .auth-footer a:hover {
            color: #003699;
            text-decoration: underline;
        }

        /* Loading Spinner for button */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-card {
                padding: 40px 24px;
            }
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-grid-dots"></div>
        <div class="auth-blobs">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
        </div>

        <div class="auth-card">
            
            <!-- Logo -->
            <div class="auth-logo">
                <a href="index.html">
                    <!-- Ensure you have a logo variant that looks good on white, otherwise fallback to main logo -->
                    <img src="assets/logo/logo.png" alt="GigFlow Logo">
                </a>
            </div>

            <h1 class="auth-title">Reset Password</h1>
            <p class="auth-subtitle">Enter your email and we'll send a reset link.</p>

            <form id="forgot-form" onsubmit="handleForgotPassword(event)">
                <div class="auth-form-group">
                    <label for="forgot-email">Email Address</label>
                    <div class="auth-input-wrap">
                        <input type="email" id="forgot-email" name="email" required placeholder="you@example.com" autocomplete="email">
                    </div>
                </div>

                <button type="submit" class="auth-btn-primary" id="forgot-btn">
                    <span id="forgot-text">Send Reset Link</span>
                    <div class="spinner" id="forgot-spinner"></div>
                </button>
            </form>

            <div class="auth-footer" style="margin-top: 32px;">
                Remember your password? <a href="login.html">Log In</a>
            </div>
            
        </div>
    </div>

    <!-- Minimal JS to handle toggles and submission -->
    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // We use the existing logic in auth.js, but intercept the form submit to add the button spinner
        document.getElementById('forgot-form').addEventListener('submit', function() {
            const btnText = document.getElementById('forgot-text');
            const spinner = document.getElementById('forgot-spinner');
            const btn = document.getElementById('forgot-btn');
            
            btnText.style.display = 'none';
            spinner.style.display = 'block';
            btn.style.pointerEvents = 'none';
            
            setTimeout(() => {
                btnText.style.display = 'block';
                spinner.style.display = 'none';
                btn.style.pointerEvents = 'auto';
            }, 3000);
        });
    </script>
</body>
</html>
