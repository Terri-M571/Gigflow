<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigFlow - Learning Hub</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">
    <!-- Google Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet">
</head>
<body>

    <!-- Header Placeholder -->
    <div id="navbar-placeholder"></div>

    <div class="app-shell container">
        <!-- Sidebar Placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Workspace -->
        <main class="main-content fade-in" style="display: flex; flex-direction: column; gap: 24px;">
            <div style="margin-bottom: 8px;">
                <h1 style="font-size: 1.8rem; font-weight: 800; margin-bottom: 4px;">Learning Pathways</h1>
                <p style="color: var(--text-muted);">Expand your career skills to align with market expectations</p>
            </div>

            <!-- Dynamic Roadmaps Section -->
            <section class="card" style="padding: 24px;" id="learning-roadmap-container">
                <!-- Roadmap will be injected here via JS based on industry -->
            </section>

            <!-- Active Courses list -->
            <div style="display: flex; flex-direction: column; gap: 16px;">
                <h3 style="font-size: 1.2rem; font-weight: 800;">Your Enrolled Courses</h3>
                
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;" id="learning-courses-list">
                    <!-- Courses will be injected here via JS based on industry -->
                </div>
            </div>
        </main>
    </div>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/learning.js"></script>
</body>
</html>
