<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigFlow - Global Job Board</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">
    <!-- Google Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet">
    <style>
        .split-pane-layout {
            display: grid;
            grid-template-columns: 35% 1fr;
            gap: 24px;
            height: calc(100vh - 200px); /* Fill remaining viewport */
            min-height: 600px;
        }

        @media (max-width: 1024px) {
            .split-pane-layout {
                grid-template-columns: 1fr;
                height: auto;
            }
            .job-details-pane {
                display: none; /* Hide details on mobile until clicked */
            }
            .job-details-pane.active-mobile {
                display: block;
                position: fixed;
                inset: 0;
                z-index: 1000;
                background: var(--bg-color);
                height: 100vh;
                border-radius: 0;
            }
        }

        .job-list-pane {
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-right: 8px; /* For scrollbar */
        }
        
        /* Custom scrollbar for list */
        .job-list-pane::-webkit-scrollbar { width: 6px; }
        .job-list-pane::-webkit-scrollbar-thumb { background-color: var(--border-color); border-radius: 4px; }

        .job-details-pane {
            background: var(--surface);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow-y: auto;
            padding: 32px;
            position: relative;
            box-shadow: 0 4px 24px rgba(0,0,0,0.02);
        }

        /* Top Filter Bar */
        .filter-bar {
            display: flex;
            gap: 16px;
            background: var(--surface);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
            align-items: center;
        }

        .filter-input-wrap {
            display: flex;
            align-items: center;
            background: var(--surface-low);
            padding: 0 16px;
            border-radius: 12px;
            height: 48px;
            flex: 1;
            border: 1px solid transparent;
            transition: border 0.2s;
        }
        .filter-input-wrap:focus-within {
            border-color: var(--primary);
        }
        .filter-input-wrap input, .filter-input-wrap select {
            border: none;
            background: transparent;
            width: 100%;
            padding: 8px;
            outline: none;
            color: var(--text-color);
            font-weight: 500;
        }
        
        .job-card-compact {
            background: var(--surface);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: var(--transition);
        }
        .job-card-compact:hover {
            border-color: var(--primary);
            background: var(--primary-container);
        }
        .job-card-compact.selected {
            border-color: var(--primary);
            border-left: 4px solid var(--primary);
            background: var(--primary-container);
        }

        /* Loading Skeleton */
        .skeleton {
            background: linear-gradient(90deg, var(--surface-low) 25%, var(--surface-container-high) 50%, var(--surface-low) 75%);
            background-size: 200% 100%;
            animation: skeletonLoading 1.5s infinite;
            border-radius: 4px;
        }
        @keyframes skeletonLoading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .jd-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 24px;
            margin-bottom: 24px;
        }
        .jd-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
        .jd-meta { color: var(--text-muted); display: flex; gap: 16px; font-weight: 500; }
        .jd-body { line-height: 1.7; font-size: 1rem; color: var(--text-color); }
        .jd-body h1, .jd-body h2, .jd-body h3 { margin-top: 24px; margin-bottom: 12px; font-weight: 700; }
        .jd-body ul, .jd-body ol { margin-left: 24px; margin-bottom: 16px; }
        
        /* HTML content overrides from API */
        .jd-body p { margin-bottom: 16px; }
    </style>
</head>
<body>

    <!-- Header Placeholder -->
    <div id="navbar-placeholder"></div>

    <div class="app-shell container">
        <!-- Sidebar Placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Workspace -->
        <main class="main-content fade-in">
            
            <h1 style="font-size: 1.8rem; font-weight: 800; margin-bottom: 24px;">Global Job Search</h1>

            <!-- Filter Bar -->
            <div class="filter-bar">
                <div class="filter-input-wrap">
                    <span class="material-symbols-outlined" style="color: var(--text-muted);">search</span>
                    <input type="text" id="job-search-input" placeholder="Search by role, company, or keyword...">
                </div>
                
                <div class="filter-input-wrap" style="max-width: 250px;">
                    <span class="material-symbols-outlined" style="color: var(--text-muted);">category</span>
                    <select id="job-category-select">
                        <option value="">All Categories</option>
                        <option value="ngo">NGO & Non-Profit</option>
                        <option value="software-dev">Software Development</option>
                        <option value="tech">Technology & IT</option>
                        <option value="design">Design</option>
                        <option value="marketing">Marketing</option>
                        <option value="sales">Sales</option>
                        <option value="product">Product</option>
                        <option value="data">Data</option>
                        <option value="healthcare">Healthcare</option>
                        <option value="finance">Finance</option>
                    </select>
                </div>
            </div>

            <!-- Split Pane Layout -->
            <div class="split-pane-layout">
                
                <!-- Left: Job List -->
                <div class="job-list-pane" id="job-list-container">
                    <!-- Skeletons while loading -->
                    <div class="job-card-compact"><div class="skeleton" style="height: 24px; width: 70%; margin-bottom: 12px;"></div><div class="skeleton" style="height: 16px; width: 40%; margin-bottom: 16px;"></div><div class="skeleton" style="height: 20px; width: 30%;"></div></div>
                    <div class="job-card-compact"><div class="skeleton" style="height: 24px; width: 70%; margin-bottom: 12px;"></div><div class="skeleton" style="height: 16px; width: 40%; margin-bottom: 16px;"></div><div class="skeleton" style="height: 20px; width: 30%;"></div></div>
                    <div class="job-card-compact"><div class="skeleton" style="height: 24px; width: 70%; margin-bottom: 12px;"></div><div class="skeleton" style="height: 16px; width: 40%; margin-bottom: 16px;"></div><div class="skeleton" style="height: 20px; width: 30%;"></div></div>
                </div>

                <!-- Right: Job Details -->
                <div class="job-details-pane" id="job-details-container">
                    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); opacity: 0.6;">
                        <span class="material-symbols-outlined" style="font-size: 64px; margin-bottom: 16px;">work</span>
                        <h3 style="font-size: 1.2rem;">Select a job to view details</h3>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/jobs.js"></script>
</body>
</html>
