<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigFlow - Sign Up</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet">
    <style>
        .pwd-strength-container {
            display: flex;
            gap: 4px;
            margin-top: 6px;
            margin-bottom: 4px;
        }
        .pwd-strength-bar {
            flex-grow: 1;
            height: 4px;
            background-color: var(--border-color);
            border-radius: var(--border-radius-full);
            transition: var(--transition-fast);
        }
        .pwd-strength-bar.weak { background-color: var(--error); }
        .pwd-strength-bar.medium { background-color: var(--secondary); }
        .pwd-strength-bar.strong { background-color: var(--success); }
    </style>
</head>
<body class="flex-center" style="min-height: 100vh; background-color: var(--bg-color); padding: 20px;">

    <div class="card fade-in" style="width: 100%; max-width: 440px; padding: 40px; background-color: var(--surface);">
        <div style="text-align: center; margin-bottom: 32px;">
            <a href="index.html">
                <img src="assets/logo/logo.png" alt="GigFlow Logo" style="height: 42px; margin-bottom: 16px;">
            </a>
            <h2>Create Account</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Start your AI-powered career journey</p>
        </div>

        <form id="signup-form">
            <div class="form-group">
                <label class="form-label" for="signup-name">Full Name</label>
                <input class="form-control" type="text" id="signup-name" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="signup-email">Email Address</label>
                <input class="form-control" type="email" id="signup-email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="signup-industry">Select Your Industry</label>
                <input type="text" class="form-control" id="signup-industry" list="industry-list" placeholder="Start typing to search..." required autocomplete="off">
                <datalist id="industry-list">
                    <option value="Accounting">
                    <option value="Administrative Services">
                    <option value="Advertising & Marketing">
                    <option value="Aerospace">
                    <option value="Agriculture">
                    <option value="Architecture">
                    <option value="Artificial Intelligence">
                    <option value="Automotive">
                    <option value="Aviation">
                    <option value="Banking">
                    <option value="Biotechnology">
                    <option value="Business Consulting">
                    <option value="Chemical Manufacturing">
                    <option value="Civil Engineering">
                    <option value="Construction">
                    <option value="Creative Arts">
                    <option value="Customer Service">
                    <option value="Cybersecurity">
                    <option value="Data Science">
                    <option value="Defence">
                    <option value="Design">
                    <option value="Digital Marketing">
                    <option value="E-commerce">
                    <option value="Education">
                    <option value="Electrical Engineering">
                    <option value="Energy">
                    <option value="Entertainment">
                    <option value="Environmental Science">
                    <option value="Event Management">
                    <option value="Fashion">
                    <option value="Finance">
                    <option value="Food & Beverage">
                    <option value="Forestry">
                    <option value="Government">
                    <option value="Graphic Design">
                    <option value="Healthcare">
                    <option value="Hospitality">
                    <option value="Human Resources">
                    <option value="Information Technology (IT)">
                    <option value="Insurance">
                    <option value="Interior Design">
                    <option value="Journalism">
                    <option value="Legal Services">
                    <option value="Logistics">
                    <option value="Manufacturing">
                    <option value="Marine">
                    <option value="Media & Communications">
                    <option value="Mining">
                    <option value="Non-Profit & NGO">
                    <option value="Oil & Gas">
                    <option value="Pharmaceutical">
                    <option value="Product Management">
                    <option value="Project Management">
                    <option value="Public Relations">
                    <option value="Real Estate">
                    <option value="Renewable Energy">
                    <option value="Research">
                    <option value="Retail">
                    <option value="Robotics">
                    <option value="Sales">
                    <option value="Social Work">
                    <option value="Software Development">
                    <option value="Sports">
                    <option value="Supply Chain">
                    <option value="Telecommunications">
                    <option value="Tourism & Travel">
                    <option value="Transportation">
                    <option value="UI/UX Design">
                    <option value="Veterinary Services">
                    <option value="Video Production">
                    <option value="Web Development">
                    <option value="Wholesale">
                    <option value="Writing & Editing">
                    <option value="Other">
                </datalist>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="signup-password">Password</label>
                <div style="position: relative;">
                    <input class="form-control" type="password" id="signup-password" placeholder="••••••••" required style="padding-right: 48px;">
                    <span class="material-symbols-outlined password-toggle" style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); user-select: none;">visibility</span>
                </div>
                <!-- Strength Indicator -->
                <div class="pwd-strength-container">
                    <div class="pwd-strength-bar"></div>
                    <div class="pwd-strength-bar"></div>
                    <div class="pwd-strength-bar"></div>
                    <div class="pwd-strength-bar"></div>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 600; color: var(--text-muted);">
                    <span>Password strength: <span id="password-strength-text" style="color: var(--text-color);">Weak</span></span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="signup-confirm-password">Confirm Password</label>
                <div style="position: relative;">
                    <input class="form-control" type="password" id="signup-confirm-password" placeholder="••••••••" required style="padding-right: 48px;">
                </div>
            </div>

            <div class="form-group">
            </div>

            <div class="form-group">
                <label class="checkbox-label" style="margin-top: 12px; margin-bottom: 16px;">
                    <input type="checkbox" id="signup-agree" required>
                    <span>I agree to the <a href="#" style="color: var(--primary); font-weight: 600;">Terms & Conditions</a></span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary w-full" style="height: 48px; font-size: 0.95rem;">Sign Up</button>
        </form>

        <div style="margin: 24px 0; display: flex; align-items: center; gap: 16px;">
            <div style="flex: 1; height: 1px; background: var(--border-color);"></div>
            <span style="color: var(--text-muted); font-size: 0.85rem; font-weight: 600;">OR</span>
            <div style="flex: 1; height: 1px; background: var(--border-color);"></div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 12px;">
            <button class="btn btn-outline w-full" onclick="location.href='/api/auth/oauth/google'" style="height: 44px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="Google" style="width: 18px;">
                Continue with Google
            </button>
            <button class="btn btn-outline w-full" onclick="location.href='/api/auth/oauth/linkedin'" style="height: 44px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/linkedin/linkedin-original.svg" alt="LinkedIn" style="width: 18px;">
                Continue with LinkedIn
            </button>
            <button class="btn btn-outline w-full" onclick="location.href='/api/auth/oauth/microsoft'" style="height: 44px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/windows8/windows8-original.svg" alt="Microsoft" style="width: 18px;">
                Continue with Microsoft
            </button>
        </div>

        <div style="text-align: center; margin-top: 32px; font-size: 0.9rem; color: var(--text-muted);">
            Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 600;">Sign In</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
