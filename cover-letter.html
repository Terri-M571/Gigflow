<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigFlow - Cover Letter AI</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Google Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet">
</head>
<body>

    <!-- Header Placeholder -->
    <div id="navbar-placeholder"></div>

    <div class="app-shell container">
        <!-- Sidebar Placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Workspace -->
        <main class="main-content fade-in">
            <div style="margin-bottom: 24px;">
                <h1 style="font-size: 1.8rem; font-weight: 800; margin-bottom: 4px;">AI Cover Letter Generator</h1>
                <p style="color: var(--text-muted);">Generate high-conversion cover letters tailored to targeted role scopes</p>
            </div>

            <div class="dashboard-grid">
                <!-- Left Input Panel -->
                <div class="card" style="padding: 28px; display: flex; flex-direction: column; gap: 20px;">
                    <div class="form-group">
                        <label class="form-label">Company Name</label>
                        <input class="form-control" type="text" id="cl-company" placeholder="e.g. Netflix">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Position Title</label>
                        <input class="form-control" type="text" id="cl-role" placeholder="e.g. Senior Product Designer">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Job Description / Requirements</label>
                        <textarea class="form-control" id="cl-jd" rows="5" placeholder="Paste the job requirements..."></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tone Select</label>
                        <select class="form-control" id="cl-tone">
                            <option value="Professional">Professional & Corporate</option>
                            <option value="Creative">Creative & Bold</option>
                            <option value="Enthusiastic">Passionate & Start-up</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="generateCoverLetter()" style="height: 46px; font-weight: 700;">Compile with AI</button>
                </div>

                <!-- Right Preview Panel -->
                <div style="display: flex; flex-direction: column; gap: 24px;">
                    <div class="card" style="padding: 28px; background-color: var(--surface-lowest); min-height: 400px; display: flex; flex-direction: column; justify-content: space-between;">
                        <div>
                            <h3 style="font-size: 1rem; margin-bottom: 16px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px;">Document Live Preview</h3>
                            <div style="font-size: 0.9rem; color: var(--text-color); white-space: pre-line; line-height: 1.6;" id="cl-output-text">
                                Your generated cover letter will render here. Fill in the parameters and click generate.
                            </div>
                        </div>
                        <div style="display: flex; gap: 12px; margin-top: 24px; border-top: 1px solid var(--border-color); padding-top: 16px;">
                            <button class="btn btn-outline" style="flex: 1;" onclick="copyCLText()">Copy Text</button>
                            <button class="btn btn-primary" style="flex: 1;" onclick="showToast('Downloading letter draft...', 'success')">Download UI</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script>
        function generateCoverLetter() {
            const company = document.getElementById('cl-company').value.trim();
            const role = document.getElementById('cl-role').value.trim();
            const tone = document.getElementById('cl-tone').value;

            if (!company || !role) {
                showToast('Please specify Company and Position Title first', 'error');
                return;
            }

            showToast('AI Cover Letter compiling...', 'info');

            setTimeout(() => {
                const letter = `Dear Hiring Team at ${company},

I am writing to express my strong interest in the ${role} position at your team. With my background in interface architecture, user-centric product designs, and collaborative workflow operations, I am excited about the opportunity to contribute.

At my previous roles, I focused on defining scalable design solutions and bridging technical engineering gaps. I appreciate the direction ${company} is pursuing and would love to bring my expertise to your active projects.

Thank you for your consideration. I look forward to discussing how my skills align with your design objectives.

Sincerely,
Alex Rivera`;

                document.getElementById('cl-output-text').textContent = letter;
                showToast('Cover Letter compiled successfully!', 'success');
            }, 1000);
        }

        function copyCLText() {
            const txt = document.getElementById('cl-output-text').textContent;
            if (txt.includes('will render here')) {
                showToast('Please generate a letter first', 'error');
                return;
            }
            navigator.clipboard.writeText(txt);
            showToast('Cover letter text copied to clipboard!', 'success');
        }
    </script>
</body>
</html>
