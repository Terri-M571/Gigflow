<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigFlow - Freelance Marketplace</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">
    <!-- Google Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet">
</head>
<body>

    <!-- Header Placeholder -->
    <div id="navbar-placeholder"></div>

    <div class="app-shell container">
        <!-- Sidebar Placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Workspace -->
        <main class="main-content fade-in" style="display: flex; flex-direction: column; gap: 24px;">
            <!-- Top search section -->
            <div class="card" style="padding: 20px;">
                <div style="display: flex; flex-wrap: wrap; gap: 12px; align-items: center;">
                    <div style="flex-grow: 1; min-width: 250px; background-color: var(--surface-low); border-radius: var(--border-radius); display: flex; align-items: center; padding: 0 16px; height: 46px;">
                        <span class="material-symbols-outlined" style="color: var(--text-muted); margin-right: 8px;">search</span>
                        <input type="text" id="freelance-search" placeholder="Search freelance projects by keywords, client name..." style="border: none; outline: none; background: transparent; width: 100%; color: var(--text-color); font-weight: 500;">
                    </div>
                    <div style="width: 220px; background-color: var(--surface-low); border-radius: var(--border-radius); display: flex; align-items: center; padding: 0 16px; height: 46px;">
                        <span class="material-symbols-outlined" style="color: var(--text-muted); margin-right: 8px;">category</span>
                        <select id="freelance-category" style="border: none; outline: none; background: transparent; width: 100%; color: var(--text-color); font-weight: 500; font-family: var(--font-sans); cursor: pointer;">
                            <option value="">All Categories</option>
                            <option value="UI/UX Design">UI/UX Design</option>
                            <option value="Development">Development</option>
                            <option value="Video & Motion Graphics">Video & Motion Graphics</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Double-column layout: filters + projects list -->
            <div class="dashboard-grid" style="grid-template-columns: 1fr;">
                <div style="display: flex; flex-direction: column; gap: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h2 style="font-size: 1.3rem; font-weight: 800;">Freelance Opportunities</h2>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 20px;" id="freelance-marketplace-list">
                        <!-- Injected dynamically via freelance.js -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script src="js/freelance.js"></script>
</body>
</html>
